syntax = "proto3";

package ocr.v1;

option go_package = "github.com/azkifairuz/my-skripsi-gwejh/ocr-service/internal/generated/proto/ocr/v1;ocrv1";

service OcrService {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc Ping(PingRequest) returns (PingResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
}

message PingRequest {
  string source = 1;
}

message PingResponse {
  string message = 1;
}
