syntax = "proto3";

package finance.v1;

option go_package = "github.com/azkifairuz/my-skripsi-gwejh/finance-service/internal/generated/proto/finance/v1;financev1";

service FinanceService {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc Ping(PingRequest) returns (PingResponse);
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
}

message PingRequest {
  string source = 1;
}

message PingResponse {
  string message = 1;
}

message CreateTransactionRequest {
  string account_id = 1;
  int64 wallet_id = 2;
  int64 category_id = 3;
  optional int64 budget_id = 4;
  string type = 5;
  double amount = 6;
  string name = 7;
  bool is_ai_generated = 8;
  string receipt_image_url = 9;
  string report_date = 10;
}

message CreateTransactionResponse {
  int64 transaction_id = 1;
  string account_id = 2;
  int64 wallet_id = 3;
  int64 category_id = 4;
  string type = 5;
  double amount = 6;
  string name = 7;
  string report_date = 8;
  string created_at = 9;
}
