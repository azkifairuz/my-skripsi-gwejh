services:
  ocr-service:
    build:
      context: ./ocr-service
    container_name: ocr-service
    environment:
      GRPC_PORT: "50051"
    expose:
      - "50051"
    ports:
      - "50051:50051"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "ping -c 1 whatsapp-service && ping -c 1 finance-service && ping -c 1 nlp-service"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  whatsapp-service:
    build:
      context: ./whatsapp-service
    container_name: whatsapp-service
    environment:
      GRPC_PORT: "50052"
      FINANCE_SERVICE_ADDR: "finance-service:50053"
      NLP_SERVICE_ADDR: "nlp-service:50054"
      OCR_SERVICE_ADDR: "ocr-service:50051"
    expose:
      - "50052"
    ports:
      - "50052:50052"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "ping -c 1 ocr-service && ping -c 1 finance-service && ping -c 1 nlp-service"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  finance-service:
    build:
      context: ./finance-service
    container_name: finance-service
    environment:
      GRPC_PORT: "50053"
      DATABASE_HOST: "${DATABASE_HOST:-host.docker.internal}"
      DATABASE_PORT: "${DATABASE_PORT:-5432}"
      DATABASE_USER: "${DATABASE_USER:-}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:-}"
      DATABASE_NAME: "${DATABASE_NAME:-my_skripsi_gwejh}"
      DATABASE_SSLMODE: "${DATABASE_SSLMODE:-disable}"
    expose:
      - "50053"
    ports:
      - "50053:50053"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "ping -c 1 ocr-service && ping -c 1 whatsapp-service && ping -c 1 nlp-service"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  nlp-service:
    build:
      context: ./nlp-service
    container_name: nlp-service
    environment:
      GRPC_PORT: "50054"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      NLP_LLM_MODEL: "qwen:4b"
      NLP_LLM_TIMEOUT_SECONDS: "120"
      NLP_LLM_MAX_RETRIES: "2"
    expose:
      - "50054"
    ports:
      - "50054:50054"
    networks:
      - app-network
    # depends_on:
      # - ollama
    healthcheck:
      test: ["CMD-SHELL", "ping -c 1 ocr-service && ping -c 1 whatsapp-service && ping -c 1 finance-service"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  ollama-data:
